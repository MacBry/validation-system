# ============================================================================
# VALIDATION SYSTEM v2.12.0 - DEVELOPMENT CONFIGURATION
# ============================================================================
# Profile: dev
# Purpose: Local development with security enabled
# ============================================================================

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:Admin123}
server.ssl.key-store-type=PKCS12

server.servlet.context-path=
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/validation_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================================
# FLYWAY CONFIGURATION
# ============================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true

# ============================================================================
# THYMELEAF CONFIGURATION
# ============================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ============================================================================
# SPRING SECURITY CONFIGURATION
# ============================================================================
# Default credentials (for initial setup only)
spring.security.user.name=admin
spring.security.user.password=${DEFAULT_ADMIN_PASSWORD:Admin123!}

# Logging for security events
logging.level.org.springframework.security=DEBUG

# ============================================================================
# REDIS CONFIGURATION (Rate Limiting)
# ============================================================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.shutdown-timeout=100ms

# ============================================================================
# ASYNC CONFIGURATION
# ============================================================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=async-

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.mac.bry.validationsystem=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.transaction=DEBUG

# Log file
logging.file.name=logs/validation-system-dev.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# FILE UPLOAD CONFIGURATION
# ============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================================================
# ACTUATOR CONFIGURATION (Development - more exposed)
# ============================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ============================================================================
# ERROR HANDLING (Development - show details)
# ============================================================================
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=false

# ============================================================================
# JACKSON CONFIGURATION (JSON)
# ============================================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Warsaw
spring.jackson.default-property-inclusion=non_null

# ============================================================================
# MESSAGES (i18n)
# ============================================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=-1

# ============================================================================
# DEVTOOLS
# ============================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================================================
# CUSTOM APPLICATION PROPERTIES
# ============================================================================

# Rate Limiting (Bucket4j)
app.rate-limit.login.capacity=10
app.rate-limit.login.refill-tokens=10
app.rate-limit.login.refill-duration=60

app.rate-limit.audit.capacity=100
app.rate-limit.audit.refill-tokens=100
app.rate-limit.audit.refill-duration=60

# Account Locking
app.security.max-failed-login-attempts=5
app.security.account-lock-duration-minutes=15

# Password Policy
app.security.password.min-length=8
app.security.password.require-uppercase=true
app.security.password.require-lowercase=true
app.security.password.require-digit=true
app.security.password.require-special=true

# Password Expiry
app.security.password.default-expiry-days=90
app.security.password.warning-days=7
app.security.password.allow-disable-expiry=true

# Scheduled Password Expiry Tasks
app.security.password-expiry.scheduled.enabled=true

# Session
app.security.session.timeout-minutes=30
app.security.remember-me.validity-days=7

# Security Keys (GMP Compliance - generate secure keys for production!)
# app.security.remember-me.key=  # Leave empty for auto-generation (dev) or set secure key (prod)

# Session Fixation Protection (GMP Compliance - FDA 21 CFR Part 11)
app.security.session.fixation-protection=changeSessionId
app.security.session.concurrent-sessions=1
app.security.session.prevent-login-if-max-sessions=false

# Audit
app.audit.retention-days=365
app.audit.async-enabled=true

# ============================================================================
# MAIL CONFIGURATION (Required for startup)
# ============================================================================
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.from=no-reply@validationsystem.com

# ============================================================================
# ELECTRONIC SIGNATURE CONFIGURATION
# ============================================================================
# Keystore używany do podpisywania PDF (ten sam co SSL dla środowiska dev)
signing.keystore.path=classpath:keystore.p12
signing.keystore.password=${SIGNING_KEYSTORE_PASSWORD:Admin123}
# Alias klucza — puste = użyj pierwszego aliasu z keystore
signing.key.alias=
# Katalog zapisu podpisanych PDF
app.signed.documents.path=uploads/signed

# ============================================================================
# TSA (TIME STAMP AUTHORITY) CONFIGURATION - GMP COMPLIANCE
# ============================================================================
# FDA 21 CFR Part 11 §11.50(a)(1)(i) wymaga trusted timestamp dla elektronicznych podpisów

# TSA włączone/wyłączone (dev: false, prod: true)
app.tsa.enabled=true

# URL TSA server (przykłady publicznych TSA):
app.tsa.url=https://freetsa.org/tsr
# app.tsa.url=http://timestamp.digicert.com
# app.tsa.url=http://time.certum.pl
# app.tsa.url=http://timestamp.globalsign.com/scripts/timstamp.dll

# TSA authentication (jeśli TSA wymaga uwierzytelniania)
# app.tsa.username=
# app.tsa.password=

# TSA policy OID (opcjonalne)
# app.tsa.policy.oid=1.3.6.1.4.1.601.10.3.1

# Fallback behavior gdy TSA niedostępne
app.tsa.fallback.enabled=true

# Timeout dla TSA requests (ms)
app.tsa.timeout=30000

# ============================================================================
# HIBERNATE ENVERS (Audit Trail / GMP Annex 11)
# ============================================================================
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.properties.org.hibernate.envers.revision_field_name=REV
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=REVTYPE
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.org.hibernate.envers.do_not_audit_optimistic_locking_field=true

# ============================================================================
# NOTES FOR DEVELOPERS
# ============================================================================
# 1. Redis musi być uruchomiony: redis-server
# 2. MySQL musi być uruchomiony: sudo systemctl start mysql
# 3. Database 'validation_db' musi istnieć
# 4. Przy pierwszym uruchomieniu wykonaj migrację SQL
# 5. Default admin login: admin / Admin123!
# ============================================================================
