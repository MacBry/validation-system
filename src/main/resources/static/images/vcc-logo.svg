<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Abstract Gauge + Checkmark -->
  <g transform="translate(300, 150)">
    <!-- Outer Circle (Gauge boundary) -->
    <path d="M -60,0 A 60,60 0 1,1 60,0" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" />
    <!-- Checkmark (Verification) -->
    <path d="M -30,0 L -5,25 L 45,-25" fill="none" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Pulse/Spark -->
    <circle cx="0" cy="-60" r="6" fill="url(#grad1)" />
  </g>

  <!-- Typography -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="url(#grad1)">VCC</text>
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#555" letter-spacing="2">VALIDATION COLD CONTROL</text>
</svg>
