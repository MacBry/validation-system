<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Błąd Systemu | System Walidacji</title>
    <!-- Bootstrap CSS - Local version to satisfy CSP -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <!-- Local Fonts -->
    <link th:href="@{/css/fonts.css}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .error-container {
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }
        .error-card {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: none;
            overflow: hidden;
            text-align: center;
            padding: 3rem 2rem;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
        }
        .error-code {
            font-weight: 700;
            font-size: 3rem;
            color: #212529;
            margin-bottom: 0.5rem;
            line-height: 1;
        }
        .error-title {
            font-weight: 600;
            font-size: 1.25rem;
            color: #495057;
            margin-bottom: 1rem;
        }
        .error-message {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }
        .btn-home {
            background-color: #0d6efd;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-home:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.25);
        }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                    <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                </svg>
            </div>
            
            <div class="error-code" th:text="${status != null ? status : '500'}">500</div>
            <div class="error-title" th:text="${error != null ? error : 'Wystąpił błąd'}">Błąd Systemowy</div>
            
            <p class="error-message" th:text="${message}">
                Przepraszamy, wystąpił nieoczekiwany problem. Spróbuj odświeżyć stronę lub wróć do menu głównego.
            </p>
            
            <a href="/" class="btn btn-primary btn-home">
                Powrót do strony głównej
            </a>
        </div>
        
        <div class="text-center footer-text">
            System Walidacji &copy; 2026 | GMP 21 CFR Part 11 Compliant
        </div>
    </div>

    <!-- Bootstrap JS - Local version with nonce -->
    <script th:src="@{/js/bootstrap.bundle.min.js}" th:nonce="${cspNonce}"></script>
</body>
</html>
