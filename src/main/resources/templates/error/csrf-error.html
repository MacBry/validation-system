<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blad bezpieczenstwa - Validation System</title>

    <!-- VCC Design System — self-hosted, no CDN -->
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/fa/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/style-saas.css}">

    <style>
        /* --- Error page layout -------------------------------- */
        .error-page {
            min-height: 100vh;
            background: var(--surface-page);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--sp-6);
        }

        .error-container {
            max-width: 600px;
            width: 100%;
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: var(--sp-10);
            text-align: center;
        }

        /* --- Icon circle — red (CSRF / security error) -------- */
        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--sp-6);
            background: #fee2e2;
            border: 2px solid #dc2626;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon i {
            font-size: 2rem;
            color: #dc2626;
        }

        /* --- Heading & message -------------------------------- */
        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 var(--sp-4);
            line-height: 1.3;
        }

        .error-message {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin: 0 0 var(--sp-8);
        }

        /* --- Action buttons ----------------------------------- */
        .error-actions {
            display: flex;
            gap: var(--sp-3);
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Primary button — solid VCC primary, no gradient */
        .vcc-btn--primary {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            padding: 11px 22px;
            background: var(--vcc-primary);
            color: var(--text-on-primary);
            border: 2px solid var(--vcc-primary);
            border-radius: var(--radius-md);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background var(--duration-fast) var(--ease-out),
                        box-shadow var(--duration-fast) var(--ease-out),
                        transform var(--duration-fast) var(--ease-out);
        }

        .vcc-btn--primary:hover {
            background: var(--vcc-primary-hover);
            border-color: var(--vcc-primary-hover);
            color: var(--text-on-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Outline button — white bg, bordered */
        .vcc-btn--outline {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-2);
            padding: 11px 22px;
            background: var(--surface-card);
            color: var(--text-secondary);
            border: 2px solid var(--border-default);
            border-radius: var(--radius-md);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background var(--duration-fast) var(--ease-out),
                        color var(--duration-fast) var(--ease-out),
                        border-color var(--duration-fast) var(--ease-out);
        }

        .vcc-btn--outline:hover {
            background: var(--surface-inset);
            color: var(--text-primary);
            border-color: var(--border-focus);
        }

        /* --- Technical details block -------------------------- */
        .technical-details {
            margin-top: var(--sp-10);
            padding: var(--sp-4);
            background: var(--surface-inset);
            border-radius: var(--radius-md);
            border-left: 4px solid #dc2626;
            text-align: left;
        }

        .technical-title {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-primary);
            margin-bottom: var(--sp-2);
        }

        .technical-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'DM Mono', 'Courier New', monospace;
            line-height: 1.7;
        }

        /* --- Responsive (mobile) ------------------------------ */
        @media (max-width: 480px) {
            .error-container {
                padding: var(--sp-6);
            }

            .error-title {
                font-size: 1.4rem;
            }

            .error-actions {
                flex-direction: column;
            }

            .vcc-btn--primary,
            .vcc-btn--outline {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="error-page">
        <div class="error-container">

            <!-- Icon circle — red, semantic CSRF/shield icon -->
            <div class="error-icon">
                <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
            </div>

            <h1 class="error-title">Zadanie zablokowane</h1>

            <p class="error-message" th:text="${errorMessage}">
                Zadanie zostalo odrzucone z powodow bezpieczenstwa. Token CSRF jest nieprawidlowy lub wygasl.
            </p>

            <!-- Action buttons -->
            <div class="error-actions">

                <a href="javascript:history.back()" class="vcc-btn--outline"
                   aria-label="Cofnij do poprzedniej strony">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    Cofnij
                </a>

                <a href="javascript:location.reload()" class="vcc-btn--primary"
                   aria-label="Odswiez strone i pobierz nowy token CSRF">
                    <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i>
                    Odswiez strone
                </a>

                <!-- Home button — shown only when no returnUrl is available -->
                <a href="/" class="vcc-btn--outline" th:if="${returnUrl == null}"
                   aria-label="Przejdz do strony glownej">
                    <i class="fa-solid fa-house" aria-hidden="true"></i>
                    Strona glowna
                </a>

                <!-- Return to form — shown only when returnUrl is set -->
                <a th:href="${returnUrl}" class="vcc-btn--outline" th:if="${returnUrl != null}"
                   aria-label="Powroc do formularza">
                    <i class="fa-solid fa-link" aria-hidden="true"></i>
                    Powroc do formularza
                </a>

            </div>

            <!-- Technical details — visible only for admin users -->
            <div class="technical-details"
                 th:if="${#strings.equals(#authentication.name, 'admin')}">
                <div class="technical-title">Szczegoly techniczne (tylko dla administratorow):</div>
                <div class="technical-text">
                    <div>Typ bledu: <span th:text="${technicalType}">UNKNOWN</span></div>
                    <div>Czas: <span th:text="${#temporals.format(timestamp, 'dd.MM.yyyy HH:mm:ss')}">-</span></div>
                    <div th:if="${returnUrl}">URL powrotu: <span th:text="${returnUrl}">-</span></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Auto-refresh CSRF token for future requests -->
    <script>
        // Pobierz nowy CSRF token z meta tag lub cookie
        function refreshCsrfToken() {
            // W Spring Security 6 CSRF token jest automatycznie dostepny w cookie XSRF-TOKEN
            const csrfCookie = document.cookie.split('; ')
                .find(row => row.startsWith('XSRF-TOKEN='));

            if (csrfCookie) {
                console.log('CSRF token odswiezony z cookie');
            }
        }

        // Odswiez token po zaladowaniu strony
        setTimeout(refreshCsrfToken, 1000);
    </script>

</body>
</html>
