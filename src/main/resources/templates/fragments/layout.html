<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">System Walidacji</title>

    <!-- CSRF Token Meta Tags for GMP Compliance -->
    <th:block th:replace="~{fragments/csrf-token :: csrf-meta}"></th:block>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Navigation Fragment -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">System Walidacji Urządzeń Chłodniczych</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/devices}">Urządzenia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/recorders}">Rejestratory TESTO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/measurements}">Serie pomiarowe</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ROLE_SUPER_ADMIN', 'ROLE_COMPANY_ADMIN')">
                        <a class="nav-link" th:href="@{/companies}">Firmy</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ROLE_SUPER_ADMIN', 'ROLE_COMPANY_ADMIN')">
                        <a class="nav-link" th:href="@{/departments}">Działy</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ROLE_SUPER_ADMIN', 'ROLE_COMPANY_ADMIN')">
                        <a class="nav-link" th:href="@{/laboratories}">Pracownie</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ROLE_SUPER_ADMIN', 'ROLE_ADMIN')">
                        <a class="nav-link" th:href="@{/admin/audit}">Audyt</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-light me-2">
                            Zalogowany: <strong sec:authentication="name">User</strong>
                        </span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Wyloguj</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Alert Messages Fragment -->
    <div th:fragment="alerts" class="container mt-3">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">System Walidacji Urządzeń Chłodniczych &copy; 2026</span>
        </div>
    </footer>

    <!-- Scripts Fragment -->
    <div th:fragment="scripts">
        <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    </div>

</body>

</html>
