<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Fragment zawierający wszystkie style i metadane -->
<th:block th:fragment="all-styles">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6ad6;
            --secondary: #764ba2;
            --background: #f7f8fc;
            --surface: #ffffff;
            --text-main: #1a1d2e;
            --text-muted: #6b7080;
            --border: #e8eaf0;
            --danger: #e53e3e;
            --danger-bg: #fef2f2;
            --danger-border: #fca5a5;
            --success: #166534;
            --success-bg: #f0fdf4;
            --success-border: #86efac;
            --radius-lg: 16px;
            --radius-md: 8px;
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.18);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        body.auth-body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--text-main);
        }

        body.admin-body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            padding: 24px 16px 40px;
            margin: 0;
            color: var(--text-main);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            background: var(--background);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            transition: var(--transition);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .form-check-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            color: var(--surface);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .alert-danger {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger);
        }

        .alert-success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success);
        }

        .admin-page {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 600;
        }

        /* Interactive radio cards */
        .card-select {
            cursor: pointer;
            transition: all 0.2s ease;
            border-width: 2px !important;
        }

        .card-select:hover {
            border-color: #4e73df !important;
            background-color: #f8f9fc;
        }

        .form-check-input:checked+.form-check-label {
            border-color: #4e73df;
        }

        .card-select.active {
            border-color: #4e73df !important;
            background-color: #eaecf4;
        }
    </style>
</th:block>

<!-- Kompatybilność wsteczna -->
<th:block th:fragment="styles">
    <th:block th:replace="~{::all-styles}"></th:block>
</th:block>

<!-- Nowy standard nagłówka -->

<head th:fragment="head(title)">
    <title th:text="${title}">Validation System</title>
    <th:block th:replace="~{::all-styles}"></th:block>
</head>

<div th:fragment="footer_scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</div>

</html>
