<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmiana hasła</title>
    <link th:href="@{/css/fonts.css}" rel="stylesheet">
    <link th:href="@{/fa/css/all.min.css}" rel="stylesheet">
    <link th:href="@{/css/style-saas.css}" rel="stylesheet">
    <style>
        /* Password field wrapper with eye-toggle */
        .vcc-pw-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .vcc-pw-wrapper .vcc-form-input {
            padding-right: 44px;
            width: 100%;
        }
        .vcc-pw-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--vcc-text-muted, #6b7080);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .vcc-pw-toggle:hover {
            color: var(--vcc-primary, #667eea);
        }

        /* Strength indicator */
        .vcc-strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e8eaf0;
            margin-top: 8px;
            overflow: hidden;
        }
        .vcc-strength-bar__fill {
            height: 100%;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .vcc-strength-label {
            font-size: 0.78rem;
            margin-top: 4px;
            font-weight: 500;
            color: var(--vcc-text-muted, #6b7080);
        }

        /* Password requirements box */
        .vcc-pw-requirements {
            background: #f7f8fc;
            border: 1px solid #e8eaf0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 8px;
        }
        .vcc-pw-requirements__title {
            font-size: 0.78rem;
            font-weight: 600;
            color: #6b7080;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }
        .vcc-pw-req-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: #6b7080;
            margin-bottom: 4px;
        }
        .vcc-pw-req-item i {
            width: 14px;
            font-size: 0.72rem;
            flex-shrink: 0;
        }
        .vcc-pw-req-item.is-met {
            color: #10b981;
        }
        .vcc-pw-req-item.is-met i::before {
            content: "\f00c"; /* fa-check */
        }
        .vcc-pw-req-item:not(.is-met) i::before {
            content: "\f111"; /* fa-circle */
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></aside>
    <div th:replace="~{fragments/sidebar :: sidebar-overlay}"></div>

    <!-- Main Content -->
    <div class="vcc-main">

        <!-- Top Bar -->
        <header th:replace="~{fragments/topbar :: topbar('dashboard', 'Profil', false, '')}"></header>

        <!-- Page body -->
        <main class="vcc-page">

            <!-- Breadcrumb -->
            <nav class="vcc-breadcrumb" aria-label="Breadcrumb">
                <a th:href="@{/}">Dashboard</a>
                <span class="vcc-breadcrumb__sep"><i class="fas fa-chevron-right"></i></span>
                <span>Profil</span>
                <span class="vcc-breadcrumb__sep"><i class="fas fa-chevron-right"></i></span>
                <span class="vcc-breadcrumb__current">Zmiana hasła</span>
            </nav>

            <!-- Flash messages -->
            <div th:if="${error}" class="vcc-flash vcc-flash--error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="vcc-flash vcc-flash--success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>

            <!-- Form header -->
            <div class="vcc-form-header">
                <h1 class="vcc-form-header__title">Zmiana hasła</h1>
                <p class="vcc-form-header__subtitle">
                    Wprowadź aktualne i nowe hasło, aby zaktualizować dane logowania.
                    Pola wymagane są oznaczone <span class="vcc-required">*</span>
                </p>
            </div>

            <!-- Form card -->
            <div class="vcc-form-card" style="max-width: 600px;">
                <form th:action="@{/profile/change-password}"
                      th:object="${changePasswordDto}"
                      method="post"
                      id="changePasswordForm"
                      novalidate>

                    <div class="vcc-form-section">
                        <legend>
                            <i class="fas fa-key"></i>
                            Dane hasła
                        </legend>

                        <!-- Current password -->
                        <div class="vcc-form-row">
                            <div>
                                <label class="vcc-form-label" for="currentPassword">
                                    Aktualne hasło <span class="vcc-required">*</span>
                                </label>
                                <div class="vcc-pw-wrapper">
                                    <input type="password"
                                           id="currentPassword"
                                           th:field="*{currentPassword}"
                                           class="vcc-form-input"
                                           th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-error' : ''"
                                           placeholder="••••••••"
                                           autocomplete="current-password"
                                           required
                                           aria-describedby="currentPasswordError">
                                    <button type="button"
                                            class="vcc-pw-toggle"
                                            id="btnToggleCurrent"
                                            aria-label="Pokaż/ukryj hasło">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div th:if="${#fields.hasErrors('currentPassword')}"
                                     id="currentPasswordError"
                                     class="vcc-form-error">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{currentPassword}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="vcc-form-section__divider"></div>

                        <!-- New password -->
                        <div class="vcc-form-row">
                            <div>
                                <label class="vcc-form-label" for="newPassword">
                                    Nowe hasło <span class="vcc-required">*</span>
                                </label>
                                <div class="vcc-pw-wrapper">
                                    <input type="password"
                                           id="newPassword"
                                           th:field="*{newPassword}"
                                           class="vcc-form-input"
                                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-error' : ''"
                                           placeholder="Minimum 8 znaków"
                                           autocomplete="new-password"
                                           required
                                           aria-describedby="newPasswordError newPasswordStrength">
                                    <button type="button"
                                            class="vcc-pw-toggle"
                                            id="btnToggleNew"
                                            aria-label="Pokaż/ukryj hasło">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>

                                <!-- Strength indicator -->
                                <div id="newPasswordStrength" aria-live="polite">
                                    <div class="vcc-strength-bar">
                                        <div class="vcc-strength-bar__fill" id="strengthFill"></div>
                                    </div>
                                    <div class="vcc-strength-label" id="strengthLabel"></div>
                                </div>

                                <!-- Requirements box -->
                                <div class="vcc-pw-requirements" id="pwRequirements">
                                    <div class="vcc-pw-requirements__title">Wymagania hasła</div>
                                    <div class="vcc-pw-req-item" id="req-length">
                                        <i class="fas"></i> Minimum 8 znaków
                                    </div>
                                    <div class="vcc-pw-req-item" id="req-upper">
                                        <i class="fas"></i> Wielka litera (A–Z)
                                    </div>
                                    <div class="vcc-pw-req-item" id="req-lower">
                                        <i class="fas"></i> Mała litera (a–z)
                                    </div>
                                    <div class="vcc-pw-req-item" id="req-digit">
                                        <i class="fas"></i> Cyfra (0–9)
                                    </div>
                                    <div class="vcc-pw-req-item" id="req-special">
                                        <i class="fas"></i> Znak specjalny (!@#$%^&amp;*)
                                    </div>
                                </div>

                                <div th:if="${#fields.hasErrors('newPassword')}"
                                     id="newPasswordError"
                                     class="vcc-form-error">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{newPassword}"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Confirm new password -->
                        <div class="vcc-form-row">
                            <div>
                                <label class="vcc-form-label" for="confirmPassword">
                                    Potwierdź nowe hasło <span class="vcc-required">*</span>
                                </label>
                                <div class="vcc-pw-wrapper">
                                    <input type="password"
                                           id="confirmPassword"
                                           th:field="*{confirmPassword}"
                                           class="vcc-form-input"
                                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-error' : ''"
                                           placeholder="Powtórz nowe hasło"
                                           autocomplete="new-password"
                                           required
                                           aria-describedby="confirmPasswordError confirmMatchMsg">
                                    <button type="button"
                                            class="vcc-pw-toggle"
                                            id="btnToggleConfirm"
                                            aria-label="Pokaż/ukryj hasło">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="confirmMatchMsg" class="vcc-form-hint" style="margin-top:6px;" aria-live="polite"></div>
                                <div th:if="${#fields.hasErrors('confirmPassword')}"
                                     id="confirmPasswordError"
                                     class="vcc-form-error">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{confirmPassword}"></span>
                                </div>
                            </div>
                        </div>

                    </div><!-- /vcc-form-section -->

                    <!-- Actions -->
                    <div class="vcc-form-actions">
                        <a th:href="@{/}" class="vcc-form-btn-cancel">
                            <i class="fas fa-arrow-left"></i>
                            Anuluj
                        </a>
                        <button type="submit" class="vcc-form-btn-submit" id="submitBtn">
                            <i class="fas fa-key"></i>
                            Zaktualizuj hasło
                        </button>
                    </div>

                </form>
            </div><!-- /vcc-form-card -->

        </main>
        <!-- Global Footer -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div><!-- /vcc-main -->

    <script th:replace="~{fragments/sidebar :: sidebar-js}"></script>

    <script th:nonce="${cspNonce}">
    document.addEventListener('DOMContentLoaded', function() {
        /* Eye-toggle */
        function togglePassword(fieldId, btn) {
            var input = document.getElementById(fieldId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('btnToggleCurrent')?.addEventListener('click', function() {
            togglePassword('currentPassword', this);
        });
        document.getElementById('btnToggleNew')?.addEventListener('click', function() {
            togglePassword('newPassword', this);
        });
        document.getElementById('btnToggleConfirm')?.addEventListener('click', function() {
            togglePassword('confirmPassword', this);
        });

        /* Strength indicator */
        function toggleReq(id, met) {
            var el = document.getElementById(id);
            if (!el) return;
            if (met) {
                el.classList.add('is-met');
            } else {
                el.classList.remove('is-met');
            }
        }

        function checkMatch() {
            var pw  = document.getElementById('newPassword').value;
            var cpw = document.getElementById('confirmPassword').value;
            var msg = document.getElementById('confirmMatchMsg');
            if (!cpw) { msg.textContent = ''; return; }
            if (pw === cpw) {
                msg.textContent = 'Hasła są zgodne.';
                msg.style.color = '#10b981';
            } else {
                msg.textContent = 'Hasła nie są zgodne.';
                msg.style.color = '#ef4444';
            }
        }

        function checkStrength(value) {
            var fill = document.getElementById('strengthFill');
            var label = document.getElementById('strengthLabel');
            var score = 0;

            var hasLength  = value.length >= 8;
            var hasUpper   = /[A-Z]/.test(value);
            var hasLower   = /[a-z]/.test(value);
            var hasDigit   = /[0-9]/.test(value);
            var hasSpecial = /[^A-Za-z0-9]/.test(value);

            /* Update requirement items */
            toggleReq('req-length',  hasLength);
            toggleReq('req-upper',   hasUpper);
            toggleReq('req-lower',   hasLower);
            toggleReq('req-digit',   hasDigit);
            toggleReq('req-special', hasSpecial);

            if (hasLength)  score++;
            if (hasUpper)   score++;
            if (hasLower)   score++;
            if (hasDigit)   score++;
            if (hasSpecial) score++;

            var strength, color, width;
            if (value.length === 0) {
                fill.style.width = '0%';
                label.textContent = '';
                return;
            }
            if (score <= 2) {
                strength = 'Słabe'; color = '#ef4444'; width = '25%';
            } else if (score === 3) {
                strength = 'Przeciętne'; color = '#f59e0b'; width = '50%';
            } else if (score === 4) {
                strength = 'Dobre'; color = '#10b981'; width = '75%';
            } else {
                strength = 'Bardzo mocne'; color = '#059669'; width = '100%';
            }

            fill.style.width = width;
            fill.style.background = color;
            label.textContent = strength;
            label.style.color = color;

            /* Also re-check match */
            checkMatch();
        }

        document.getElementById('newPassword')?.addEventListener('input', function() {
            checkStrength(this.value);
        });

        document.getElementById('confirmPassword')?.addEventListener('input', checkMatch);

        /* Spinner on submit */
        document.getElementById('changePasswordForm').addEventListener('submit', function() {
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Zapisywanie...';
        });
    });
    </script>

</body>
</html>
