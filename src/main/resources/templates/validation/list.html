<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walidacje - VCC</title>
    <link th:href="@{/css/fonts.css}" rel="stylesheet">
    <link th:href="@{/fa/css/all.min.css}" rel="stylesheet">
    <link th:href="@{/css/style-saas.css}" rel="stylesheet">
</head>

<body>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar('validations')}"></aside>
    <div th:replace="~{fragments/sidebar :: sidebar-overlay}"></div>

    <!-- Main Content -->
    <div class="vcc-main">

        <!-- Top Bar -->
        <header th:replace="~{fragments/topbar :: topbar('validations', 'Walidacje', true, 'validationSearchInput')}"></header>

        <!-- Page body -->
        <main class="vcc-page">

            <div class="vcc-page-header">
                <h1 class="vcc-page-header__title">Lista walidacji</h1>
                <div class="vcc-page-header__actions">
                    <a th:href="@{/wizard/new}" class="vcc-btn--action">
                        <i class="fas fa-bolt"></i>
                        Nowa kwalifikacja (Wizard)
                    </a>
                </div>
            </div>

            <!-- Flash messages -->
            <div th:if="${successMessage}" class="vcc-flash vcc-flash--success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${error}" class="vcc-flash vcc-flash--error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Filters -->
            <form th:action="@{/validations}" method="get" class="vcc-filters" id="filterForm" style="margin-bottom: var(--sp-6); border-radius: var(--radius-lg); border-bottom: none; box-shadow: var(--shadow-sm);">
                <div class="vcc-filter-group">
                    <label class="vcc-filter-label">Status</label>
                    <select name="status" id="statusSelect" class="vcc-filter-select">
                        <option value="">Wszystkie statusy</option>
                        <option th:each="s : ${allStatuses}" 
                                th:value="${s}" 
                                th:text="${s.displayName}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>

                <div class="vcc-filter-group">
                    <label class="vcc-filter-label">Firma</label>
                    <select name="companyId" id="companySelect" class="vcc-filter-select">
                        <option value="">Wszystkie firmy</option>
                        <option th:each="c : ${companies}" 
                                th:value="${c.id}" 
                                th:text="${c.name}"
                                th:selected="${c.id == companyId}"></option>
                    </select>
                </div>
                
                <div class="vcc-filter-group">
                    <label class="vcc-filter-label">Dział</label>
                    <select name="departmentId" id="departmentSelect" class="vcc-filter-select">
                        <option value="">Wszystkie działy</option>
                        <option th:each="d : ${departments}" 
                                th:value="${d.id}" 
                                th:text="${d.name}"
                                th:selected="${d.id == departmentId}"></option>
                    </select>
                </div>
                
                <div class="vcc-filter-group">
                    <label class="vcc-filter-label">Pracownia</label>
                    <select name="laboratoryId" id="laboratorySelect" class="vcc-filter-select">
                        <option value="">Wszystkie pracownie</option>
                        <option th:each="l : ${laboratories}" 
                                th:value="${l.id}" 
                                th:text="${l.fullName}"
                                th:selected="${l.id == laboratoryId}"></option>
                    </select>
                </div>
                
                <div class="vcc-filter-actions">
                    <button type="submit" class="vcc-btn vcc-btn--primary vcc-btn--filter">
                        <i class="fas fa-filter"></i> Filtruj
                    </button>
                    <a th:href="@{/validations}" class="vcc-btn vcc-btn--outline vcc-btn--filter">
                        <i class="fas fa-undo"></i> Reset
                    </a>
                </div>
            </form>

            <!-- Data card -->
            <div class="vcc-data-card vcc-animate-fade-in">

                <div th:if="${#lists.isEmpty(validations)}" class="vcc-empty-state">
                    <i class="fas fa-clipboard-check vcc-empty-state__icon"></i>
                    <p class="vcc-empty-state__title"
                       th:text="${currentStatus != null ? 'Brak walidacji ze statusem: ' + currentStatus.displayName : 'Brak walidacji'}">
                        Brak walidacji
                    </p>
                    <p class="vcc-empty-state__desc">Walidacje są tworzone z listy pomiarów lub za pomocą Wizarda</p>
                </div>

                <div th:unless="${#lists.isEmpty(validations)}" class="vcc-table-wrap">
                    <table class="vcc-table">
                        <thead>
                            <tr>
                                <th style="width:80px">ID</th>
                                <th>Data utworzenia</th>
                                <th>Status</th>
                                <th>Liczba serii</th>
                                <th>Urządzenie</th>
                                <th>Akcje</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="validation : ${validations}">
                                <td>
                                    <span class="vcc-table__mono" style="color: var(--vcc-primary);"
                                          th:text="'#' + ${validation.id}">ID</span>
                                </td>
                                <td>
                                    <div class="vcc-table__primary" th:text="${#temporals.format(validation.createdDate, 'dd.MM.yyyy')}">Data</div>
                                    <div class="vcc-table__muted" th:text="${#temporals.format(validation.createdDate, 'HH:mm')}">Czas</div>
                                </td>
                                <td>
                                    <span class="vcc-status"
                                          th:classappend="${validation.status.name() == 'DRAFT' ? 'vcc-status--draft' :
                                                         (validation.status.name() == 'APPROVED' ? 'vcc-status--valid' :
                                                         (validation.status.name() == 'COMPLETED' ? 'vcc-status--completed' : 'vcc-status--invalid'))}"
                                          th:text="${validation.status.displayName}">
                                        Status
                                    </span>
                                </td>
                                <td>
                                    <span class="vcc-table__primary" th:text="${#lists.size(validation.measurementSeries)}">0</span>
                                    <span class="vcc-table__muted"
                                          th:text="${#lists.size(validation.measurementSeries) == 1 ? 'seria' :
                                                   (#lists.size(validation.measurementSeries) < 5 ? 'serie' : 'serii')}">serii</span>
                                </td>
                                <td>
                                    <div th:if="${!#lists.isEmpty(validation.measurementSeries) && validation.measurementSeries[0].coolingDevice != null}">
                                        <div class="vcc-table__primary" th:text="${validation.measurementSeries[0].coolingDevice.name}">Urządzenie</div>
                                        <div class="vcc-table__muted">
                                            <span th:text="'Nr inw: ' + ${validation.measurementSeries[0].coolingDevice.inventoryNumber}">Nr</span>
                                            <span style="margin:0 4px">&#183;</span>
                                            <div class="vcc-unit-stack">
                                                <span class="vcc-table__label" th:text="${validation.measurementSeries[0].coolingDevice.department.abbreviation}">DEPT</span>
                                                <th:block th:if="${validation.measurementSeries[0].coolingDevice.laboratory != null}">
                                                    <span class="vcc-table__label vcc-table__label--lab" th:text="${validation.measurementSeries[0].coolingDevice.laboratory.abbreviation}">LAB</span>
                                                </th:block>
                                            </div>
                                        </div>
                                    </div>
                                    <div th:if="${#lists.isEmpty(validation.measurementSeries) || validation.measurementSeries[0].coolingDevice == null}"
                                         class="vcc-table__muted">
                                        Brak informacji
                                    </div>
                                </td>
                                <td>
                                    <div class="vcc-table__actions">
                                        <a th:href="@{/validations/{id}(id=${validation.id}, from=${selectedStatus != null ? '/validations?status=' + selectedStatus : '/validations'})}"
                                           class="vcc-btn--table vcc-btn--table-primary">
                                            <i class="fas fa-eye"></i> Szczegóły
                                        </a>
                                        <button th:data-url="@{/validations/{id}/package(id=${validation.id})}"
                                                th:data-filename="|Walidacja_${validation.id}_${#temporals.format(validation.createdDate, 'yyyy-MM-dd')}.zip|"
                                                class="vcc-btn--table vcc-btn--table-success download-btn">
                                            <i class="fas fa-file-archive"></i> ZIP
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:unless="${#lists.isEmpty(validations)}" class="vcc-data-card__footer">
                    <div class="vcc-data-card__count">
                        Łącznie: <span class="vcc-data-card__count-badge" th:text="${#lists.size(validations)}">0</span>
                        <span th:text="${currentStatus != null ? 'walidacji ze statusem: ' + currentStatus.displayName : 'walidacji'}">walidacji</span>
                    </div>
                </div>

            </div>
        </main>
        <!-- Global Footer -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>

    <script th:replace="~{fragments/sidebar :: sidebar-js}"></script>

    <script th:nonce="${cspNonce}">
    function downloadFile(url, filename) {
        fetch(url, { credentials: 'same-origin' })
            .then(function(r) { if (!r.ok) throw new Error(r.status); return r.blob(); })
            .then(function(blob) {
                var u = window.URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.style.display = 'none'; a.href = u; a.download = filename;
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(u); document.body.removeChild(a);
            }).catch(function(e) { alert('Błąd pobierania: ' + e); });
    }

    (function() {
        var input = document.getElementById('validationSearchInput');
        if (input) {
            input.addEventListener('input', function() {
                var filter = this.value.toLowerCase();
                var rows = document.querySelectorAll('.vcc-table tbody tr');
                rows.forEach(function(row) {
                    row.style.display = row.textContent.toLowerCase().indexOf(filter) > -1 ? '' : 'none';
                });
            });
        }

        // --- Multi-level Filter Cascading Logic ---
        const companySelect = document.getElementById('companySelect');
        const departmentSelect = document.getElementById('departmentSelect');
        const laboratorySelect = document.getElementById('laboratorySelect');

        if (companySelect) {
            companySelect.addEventListener('change', function() {
                const companyId = this.value;
                departmentSelect.innerHTML = '<option value="">Wszystkie działy</option>';
                laboratorySelect.innerHTML = '<option value="">Wszystkie pracownie</option>';
                
                if (companyId) {
                    fetch('/departments/by-company/' + companyId)
                        .then(response => response.json())
                        .then(data => {
                            data.forEach(dept => {
                                const option = document.createElement('option');
                                option.value = dept.id;
                                option.textContent = dept.name;
                                departmentSelect.appendChild(option);
                            });
                        });
                }
            });
        }

        if (departmentSelect) {
            departmentSelect.addEventListener('change', function() {
                const departmentId = this.value;
                laboratorySelect.innerHTML = '<option value="">Wszystkie pracownie</option>';
                
                if (departmentId) {
                    fetch('/departments/' + departmentId + '/laboratories')
                        .then(response => response.json())
                        .then(data => {
                            data.forEach(lab => {
                                const option = document.createElement('option');
                                option.value = lab.id;
                                option.textContent = lab.name;
                                laboratorySelect.appendChild(option);
                            });
                        });
                }
            });
        }

        // Download listeners
        document.querySelectorAll('.download-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                downloadFile(this.getAttribute('data-url'), this.getAttribute('data-filename'));
            });
        });
    })();
    </script>

</body>

</html>
